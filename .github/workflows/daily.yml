name: Daily BMS Paper Agent DeepSeek

on:
  schedule:
    # GitHub cron uses UTC. 00:30 UTC = 08:30 Beijing/Singapore time.
    - cron: "30 0 * * *"
  workflow_dispatch:

# Avoid overlapping Pages deployments.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MAX_TOKENS: ${{ secrets.DEEPSEEK_MAX_TOKENS }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      S2_API_KEY: ${{ secrets.S2_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Check runtime configuration
        run: |
          python - <<'PY'
          import os
          keys = [
              "DEEPSEEK_API_KEY",
              "DEEPSEEK_MODEL",
              "DEEPSEEK_BASE_URL",
              "DEEPSEEK_MAX_TOKENS",
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USER",
              "SMTP_PASS",
              "EMAIL_FROM",
              "EMAIL_TO",
          ]
          for k in keys:
              v = os.getenv(k)
              print(f"{k}: {'SET' if v else 'MISSING'}")
          PY
          
      - name: Run DeepSeek paper agent
        run: python daily_paper_agent.py

      - name: Commit archive files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs
          if git diff --staged --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "chore: add daily BMS paper report"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

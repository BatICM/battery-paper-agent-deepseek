project:
  name: "Battery Management Literature Daily"
  timezone: "Asia/Shanghai"
  language: "zh-CN"
  lookback_days: 2
  fallback_lookback_days: 7
  max_candidates_per_source: 40
  max_final_papers: 12
  min_score_keep: 20

deepseek:
  # 可被环境变量 DEEPSEEK_MODEL / DEEPSEEK_BASE_URL 覆盖。
  # DeepSeek 官方 OpenAI-compatible base_url: https://api.deepseek.com
  enabled: true
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_tokens: 6000

sources:
  arxiv:
    enabled: true
    categories:
      - cs.LG
      - cs.AI
      - eess.SY
      - stat.ML

  openalex:
    enabled: true

  crossref:
    enabled: true

  semantic_scholar:
    enabled: false

  google_scholar:
    enabled: false

  rss_feeds:
    enabled: true
    max_results_per_feed: 25
    source_bonus: 18
    feeds:
      - name: "Nature"
        url: "https://www.nature.com/nature.rss"
        priority: 1

      - name: "Nature Energy"
        url: "https://www.nature.com/nenergy.rss"
        priority: 2

      - name: "Nature Communications"
        url: "https://www.nature.com/ncomms.rss"
        priority: 3

      - name: "Nature Sustainability"
        url: "https://www.nature.com/natsustain.rss"
        priority: 4

      - name: "Joule"
        url: "https://www.cell.com/joule/rss"
        priority: 5

      - name: "Energy & Environmental Science"
        url: "https://pubs.rsc.org/en/rss/journalissues/ee"
        priority: 6

      - name: "Advanced Energy Materials"
        url: "https://advanced.onlinelibrary.wiley.com/action/showFeed?jc=16146840&type=etoc&feed=rss"
        priority: 7

      - name: "Energy Storage Materials"
        url: "https://rss.sciencedirect.com/publication/science/24058297"
        priority: 8

      - name: "Applied Energy"
        url: "https://rss.sciencedirect.com/publication/science/03062619"
        priority: 9

      - name: "Journal of Power Sources"
        url: "https://rss.sciencedirect.com/publication/science/03787753"
        priority: 10

      - name: "Journal of Energy Storage"
        url: "https://rss.sciencedirect.com/publication/science/2352152X"
        priority: 11

      - name: "IEEE Transactions on Power Electronics"
        url: "https://ieeexplore.ieee.org/rss/TOC63.XML"
        priority: 12

      - name: "IEEE Transactions on Transportation Electrification"
        url: "https://ieeexplore.ieee.org/rss/TOC6687317.XML"
        priority: 13

      - name: "IEEE Transactions on Industrial Electronics"
        url: "https://ieeexplore.ieee.org/rss/TOC41.XML"
        priority: 14

      - name: "IEEE Transactions on Intelligent Transportation Systems"
        url: "https://ieeexplore.ieee.org/rss/TOC6979.XML"
        priority: 15

      - name: "IEEE Transactions on Industrial Informatics"
        short_name: "IEEE TII"
        url: "https://ieeexplore.ieee.org/rss/TOC9424.XML"
        priority: 16

      - name: "IEEE/ASME Transactions on Mechatronics"
        short_name: "IEEE/ASME TMech"
        url: "https://ieeexplore.ieee.org/rss/TOC3516.XML"
        priority: 17

      - name: "eTransportation"
        url: "https://rss.sciencedirect.com/publication/science/25901168"
        priority: 18

      - name: "Cell Reports Physical Science"
        url: "https://www.cell.com/cell-reports-physical-science/rss"
        priority: 19

      - name: "Renewable and Sustainable Energy Reviews"
        url: "https://rss.sciencedirect.com/publication/science/13640321"
        priority: 20

queries:
  include:
    - "battery management system"
    - "state of health battery"
    - "remaining useful life battery"
    - "state of charge battery"
    - "battery fault diagnosis"
    - "thermal runaway early warning battery"
    - "battery pack inconsistency"
    - "cloud battery management"
    - "EV fleet battery health"
    - "energy storage battery health management"
    - "battery digital twin"
    - "physics-informed battery"
    - "battery prognostics"
    - "battery safety warning"
    - "battery pack degradation"
    - "battery fleet data"
    - "battery pack state estimation"
  exclude:
    - "cathode synthesis"
    - "anode synthesis"
    - "electrolyte additive"
    - "solid-state electrolyte"
    - "lithium metal anode"
    - "sodium metal anode"
    - "catalyst"
    - "hydrogen evolution"
    - "fuel cell"
    - "recycling only"
    - "material characterization only"
    - "materials synthesis"
    - "electrode fabrication"
    - "electrochemical mechanism only"


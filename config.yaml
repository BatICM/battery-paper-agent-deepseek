project:
  name: "Battery Management Literature Daily"
  timezone: "Asia/Shanghai"
  language: "zh-CN"
  lookback_days: 2
  fallback_lookback_days: 7
  max_candidates_per_source: 40
  max_final_papers: 12
  min_score_keep: 20

deepseek:
  # 可被环境变量 DEEPSEEK_MODEL / DEEPSEEK_BASE_URL 覆盖。
  # DeepSeek 官方 OpenAI-compatible base_url: https://api.deepseek.com
  enabled: true
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_tokens: 6000

sources:
  arxiv:
    enabled: true
    categories:
      - cs.LG
      - cs.AI
      - eess.SY
      - stat.ML
  openalex:
    enabled: true
  crossref:
    enabled: true
  semantic_scholar:
    enabled: false  # 默认关闭，避免免费额度/限流；需要时可改 true 并添加 S2_API_KEY
  google_scholar:
    # Google Scholar 没有官方公开 API；这里通过 SerpAPI 的 google_scholar engine 做补充召回。
    # GitHub Secrets 中添加 SERPAPI_KEY 后生效；没有 key 时会自动跳过。
    enabled: true
    max_queries: 8
    max_results: 10
    hl: "en"
    journal_boost_queries: true
    max_journal_queries: 8
    sleep_seconds: 1.0

queries:
  include:
    - "battery management system"
    - "state of health battery"
    - "remaining useful life battery"
    - "state of charge battery"
    - "battery fault diagnosis"
    - "thermal runaway early warning battery"
    - "battery pack inconsistency"
    - "cloud battery management"
    - "EV fleet battery health"
    - "energy storage battery health management"
    - "battery digital twin"
    - "physics-informed battery"
    - "battery prognostics"
    - "battery safety warning"
    - "battery pack degradation"
    - "battery fleet data"
    - "battery pack state estimation"
  exclude:
    - "cathode synthesis"
    - "anode synthesis"
    - "electrolyte additive"
    - "solid-state electrolyte"
    - "lithium metal anode"
    - "sodium metal anode"
    - "catalyst"
    - "hydrogen evolution"
    - "fuel cell"
    - "recycling only"
    - "material characterization only"
    - "materials synthesis"
    - "electrode fabrication"
    - "electrochemical mechanism only"

